name: Deploy to S3

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    uses: OpenNews/opennews-actions/.github/workflows/jekyll-deploy.yml@v1
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      production-url: https://srccon.org
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
