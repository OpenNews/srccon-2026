<!DOCTYPE html>
<html class=\"no-js\">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>SRCCON 2026 Schedule</title>
        <meta name="description" content="Scheduled program for SRCCON 2026!">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <script src="https://use.typekit.net/clq2rji.js"></script>
        <script>try{Typekit.load();}catch(e){}</script>
        
        <meta property="og:title" content="SRCCON 2026 Schedule">
        <meta property="og:type" content="article">
        <meta property="og:description" content="A participant-led conference from OpenNews for journalists who want to transform their work, their organizations, and their communities."/>
        <meta property="og:image" content="https://2026.srccon.org/media/img/srccon_share_logo.png" />
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:site" value="@srccon" />
        <meta name="twitter:title" value="SRCCON 2026 Schedule" />
        <meta name="twitter:description" value="A participant-led conference from OpenNews for journalists who want to transform their work, their organizations, and their communities." />
        <meta name="twitter:image" value="https://2026.srccon.org/media/img/srccon_share_logo.png" />
        
        <link rel="stylesheet" href="css/font-awesome.min.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header class="header-mainlayout layout-col-m">
            <h1><a href="https://2026.srccon.org">SRCCON 2026</a></h1>
        </header>

        <div id="schedule-app"></div>

        <script type="text/template" id="session-list-template">
        <div id="filter-controls" class="layout-col-n">
            <div class="filter-tabs group">
                <% _.each(config.tabList, function(tab) { %>
                    <a href="#<%= tab.name.toLowerCase() %>" id="tab-<%= tab.name.toLowerCase() %>" class="tab-link"><%= tab.displayName %></a>
                <% }); %>
            </div>
            <div class="filter-search-box search-form-wrapper hide-if-no-js">
                <input type="text" id="search-sessions" placeholder="Search sessions..." autocomplete="off">
                <span class="search-clear-btn" id="search-clear"><i class="fa fa-times-circle"></i></span>
            </div>
        </div>

        <div class="layout-col-m">
            <div id="session-list" class="group"></div>
        </div>
        </script>

        <script type="text/template" id="session-card-template">
        <div class="session-card-inner">
            <span class="session-time"><%= session.time %></span>
            <% if (session.room) { %><span class="session-room"><%= session.room %></span><% } %>
            <h2 class="session-title">
                <a href="#session-<%= session.id %>"><%= session.title %></a>
            </h2>
            <% if (session.facilitators) { %>
                <div class="session-facilitators"><%= session.facilitators %></div>
            <% } %>
        </div>
        </script>

        <script type="text/template" id="session-detail-template">
        <div class="layout-col-m">
            <div class="back-to-schedule-link">
                <a href="#<%= session.day.toLowerCase() %>"><i class="fa fa-chevron-left"></i> Back to Schedule</a>
            </div>
            
            <div class="session-detail-header group">
                <div class="session-metadata">
                    <p class="session-time-block">
                        <strong><%= session.day %></strong>, <%= session.time %>
                    </p>
                    <% if (session.room) { %>
                        <p class="session-room-block">
                            <strong>Room:</strong> <%= session.room %>
                        </p>
                    <% } %>
                    <% if (session.notepad) { %>
                        <p class="session-link-block">
                            <a href="<%= session.notepad %>" target="_blank"><i class="fa fa-file-text-o"></i> Collaborative Notes</a>
                        </p>
                    <% } %>
                    <% if (session.transcription) { %>
                        <p class="session-link-block">
                            <a href="<%= session.transcription %>" target="_blank"><i class="fa fa-comments-o"></i> Session Transcript</a>
                        </p>
                    <% } %>
                </div>
                
                <article class="session-detail-content">
                    <h1 class="session-title"><%= session.title %></h1>
                    <% if (session.facilitators) { %>
                        <div class="session-facilitators">
                            <strong>Facilitated by:</strong> <%= session.facilitators %>
                        </div>
                    <% } %>
                    
                    <div class="session-description">
                        <%= marked(session.description) %>
                    </div>
                    
                    <div class="session-tweets-wrapper">
                        <% if (session.tweets && session.tweets.length) { %>
                            <h3>Coverage & Documentation</h3>
                            <% _.each(session.tweets, function(tweet) { %>
                                <%= embedTweet(tweet) %>
                            <% }); %>
                        <% } %>
                    </div>
                </article>
            </div>
        </div>
        </script>
        
        <script src="js/jquery-2.1.0.min.js"></script>
        <script src="js/underscore-min.js"></script>
        <script src="js/marked.min.js"></script>
        <script src="js/moment.min.js"></script>
        <script src="js/moment-timezone.min.js"></script>
        <script src="js/schedule.js"></script>
        <script>
            var config = {
                pathToSessionsJson: 'sessions.json',
                // Updated unique key for the 2026 build state
                localStoragePrefix: 'srccon-2026',
                localizeTimes: false,
