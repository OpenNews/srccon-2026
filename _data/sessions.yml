    "title": "The future of news is accessible",
    "facilitators": "Stacy Kess, Keidra Chaney",
    "description": "As journalism becomes more digital and more directed to social media, news is leaving out millions of people. Disability is more common that most realize: 1 in 4 American adults identify as disabled; 1 in 5 American adults are on the spectrum of blindness or low vision; 1 in 20 American adults are Deaf or hard of hearing; and 1 in 100 American adults have a cognitive disability, but the digital journalism industry isn\u2019t reaching these potential news consumers \u2014\u00a0meaning potential lost readers, listeners, and watchers; potential lost revenue; and eventually, potential lost jobs. But it\u2019s more than these missing new audience member\u2019s dollars. Bringing in more readers, listeners, and watchers strengthens democracy, community, and civic participation. The future of news must be accessible."
