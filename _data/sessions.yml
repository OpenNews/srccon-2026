  {
    "id": "ai-hidden-ways",
    "title": "Uncovering the hidden ways that AI (money) is trying to shape AI coverage",
    "facilitators": "Klaudia Jaźwińska, Adam Becker, Eileen Guo, Shazeda Ahmed",
    "description": "This session intends to start an honest and open conversation about an under-addressed issue in tech reporting—that the very AI stakeholders that we report on are increasingly trying to shape coverage—and discuss concerns, questions, and how journalists and newsrooms should respond. What are the costs of accepting funding or training, especially in a media landscape that is increasingly financially precarious? What questions should newsroom leaders and reporters be asking as we consider these opportunities? And ultimately, how can we best maintain journalistic norms and serve our readers amid the AI sector\u2019s increasing influence in both news coverage and our daily lives?\n\nWe know this is a hard conversation for many, and we\u2019re not interested in ad hominem antagonizing of individuals or news outlets that are working with some of these organizations. Rather, we want to facilitate a conversation for people to share their own experiences, observations, concerns, and questions about emerging dynamics related to AI money and journalism—with the idea of coming away better-informed about the relationship between tech billionaires, AI boomers and doomers, newsrooms, and power."
