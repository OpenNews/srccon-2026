    "id": "learned-building-newsroom-tech-stack",
    "title": "What I learned building a newsroom tech stack without knowing how to code",
    "facilitators": "Nina Ignaczak, Janie Haseman",
    "description": "What does it actually look like to build production journalism tools without an engineering background, or an engineering budget? Nina Ignaczak, founder and executive director of Planet Detroit, will share real examples from her newsroom\u2019s experience shipping a civic engagement tool, a RAG-powered search API, an interactive directory of 600+ Michigan environmental organizations, and more, all through conversational AI development. But what surprised her most wasn\u2019t how much AI could do. It was how much results improved once she started thinking like a software engineer. Adopting a spec-driven process, defining who a tool is for, what working correctly looks like, and what broken looks like before touching any code, made everything better. \n\nUnderstanding basic architecture concepts meant more useful conversations with AI tools, fewer late-stage surprises, and tools that actually held up in production. The second half of the session turns it over to participants. In small groups, attendees will take a real problem from their own newsroom and work through the first steps of building a solution, drafting a spec, scoping the problem, thinking through edge cases. Everyone leaves with something concrete they can actually use, and a better sense of what\u2019s within reach when you pair curiosity with a little engineering discipline."
