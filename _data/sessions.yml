[
  {
    "id": "protecting-devices-prying-eyes",
    "title": "\u201cI don\u2019t believe that this is encrypted so I think we\u2019re OK\": Protecting your devices from prying eyes",
    "facilitators": "Davis Erin Anderson",
    "description": "While raids are extremely unlikely, the ones we've seen take place at a newsroom in Kansas in 2023 and at the home of a WaPo reporter earlier this year have proven to be deeply impactful to the lives and livelihoods of the journalists and publishers involved. Meanwhile, reporters, law enforcement officers, and everyone else uses phones to record one another's activities. There's a pressing need to make sure that mobile phones and laptops are set up to protect reporting materials, contact info for sources, and the list goes on.\n\nLet's take a moment to make sure that your device is prepared to meet the moment (even if that moment is a trip overseas this year! We can still dream). Join this session to implement concrete steps to protect your devices from unwanted incursions of various kinds. We will take time for you to investigate the settings on your laptops and phones to make sure they match your security needs and usability preferences, and perhaps even leave you with some helpful habits and routines that keep you set up for safety."
  },
  {
    "id": "collaborative-airtable-budget",
    "title": "Build a better budget: A collaborative Airtable session",
    "facilitators": "Ellery Jones",
    "description": "Building a newsroom editorial calendar is maybe the most un-glamorous job in a news organization. On the one hand, it's absolutely critical to have a detailed database of all your content, from web stories to social media posts to podcast segments. It's next to impossible to plan upcoming coverage without it (and it comes in handy for grant reporting!). On the other hand, it seems like no single system works for everyone. Getting editors and reporters to use it is like herding cats on the wide open prairie in the middle of a blizzard.\n\nAirtable is a common tool for newsrooms trying to wrangle their content. In this session, we'll look at a few examples of newsroom databases at Chicago Public Media and talk about how we got the newsroom to adopt them. We'll talk a little bit about what issues are coming up in your newsrooms. Then, we'll get hands-on and try to build a rudimentary task management tool together."
  },
  {
    "id": "local-news-work-as-consumer",
    "title": "Can local news work as a consumer product?",
    "facilitators": "Eric Ulken",
    "description": "Local journalism's value as a public good is well documented. Its value to individual consumers \u2014 what makes them open their wallets in ongoing support \u2014 isn't as well understood, much less deliberately designed for. During my year as a John S. Knight Journalism Fellow at Stanford, I developed a thesis about that gap: what audience value actually means, how newsrooms often fail to create and communicate it, and what a more consumer-centered journalism might look like in the age of AI.\n\nI want to use the first part of this session to share that thesis \u2014 briefly and as a provocation \u2014 and then turn the room loose on the harder questions: What would it take to make news function as a product people choose rather than a cause they support? What would have to change about how we make editorial decisions, how we design products, how we talk to audiences, how we price and package our journalism? This session is for anyone with thoughts about the relationship between journalism and the people it serves \u2014 no product experience needed!"
  },
  {
    "id": "civic-journalism-community-organizing-how",
    "title": "Civic journalism, community organizing and how we build movement against the tide",
    "facilitators": "William Lager",
    "description": "What happens when the community is the media? Let's put our community organizer hats on and share what has worked to build up civic journalism with our communities. Were they pop-up newsrooms? A special newsletter? A zine, or was it something more? Showing up at every community event to create one on one relationships? Legacy media built itself on a separation from community with the idea that it would ensure objectivity and insulate power from informing the content, and we can see it has fallen short."
  },
  {
    "id": "community-journalism-lessons-local-farmers",
    "title": "Community Journalism \u2014 Lessons from your local farmers market",
    "facilitators": "Cirien Saadeh",
    "description": "Healthy and sustainable local food systems rely on relationships, collaborations, shared infrastructure, and community stewardship. These ecosystems are made up of interconnected nodes and connective tissue\u2014farmers markets, distribution networks, farmers, education, community leadership, and more. Food systems scholars and food justice organizers have spent decades studying food systems resilience. Indicators often include diversity, redundancy, infrastructure, distribution networks, knowledge sharing, and community participation. If we can consider community journalism through a similar lens, these indicators may help us imagine and articulate healthier and more sustainable community journalism ecosystems. \n\nViewing community journalism as an ecosystem helps us understand the work we do and the roles we play  \u2014 as tools for sustainability. It asks us\u2014whether we are funders, educators, journalists, technologists, community members, etc\u2014to imagine models for community journalism that prioritize relationships, shared infrastructure, and a collective resilience. By drawing from frameworks used in communities where work is being done to build more resilient food ecosystems, we can explore how we might cultivate healthier and more sustainable community journalism ecosystems. \n\nThis session draws on emerging research exploring how more resilient community journalism can be built by examining local news systems in St. Paul, MN and Prescott, AZ.  Through examination of nodes and connective tissue, the project asks how lessons from resilient food systems might inform the development of sustainable community news ecosystems."
  },
  {
    "id": "community-skunk-works-ai-beyond",
    "title": "Community skunk works (AI beyond capitalism)",
    "facilitators": "Dan Schultz",
    "description": "What happens when communities, not venture capital, experiment with AI to create tools for themselves?  Many communities have experts who want to volunteer their time and experience for the betterment of their neighbors.  Let's figure out how those people can use LLMs to create tools that honor accountability and create public good.\n\nJoin this session to help develop a set of guidelines and recipes that can be brought to physical communities to make it easy for them to turn needs and ideas into real initiatives through code, documentation, processes, and even new organizations."
  },
  {
    "id": "designing-tools-journalists-actually-use",
    "title": "Designing tools journalists actually use",
    "facilitators": "Monica Williams",
    "description": "Journalists complain about and build tools all the time, but are we designing them with real newsroom constraints or user interest in mind?\n\nWe build:\n* Databases and dashboards that aren't updated\n* Databases of names of journalists. Does anyone use them?\n* AI tools no one trusts\n* Tools that are replications of what's already been done\n\nThis interactive session will examine how tools get built and how do we get people to adopt them? When should we not build?"
  },
  {
    "id": "using-imperfect-data-newsletter-strategy",
    "title": "From vibes to signals: Using imperfect data to shape newsletter strategy",
    "facilitators": "Emily Hood, Aditi Mukund",
    "description": "Newsletters are one of journalism\u2019s most direct and owned relationships with audiences, making it crucial to have data on what\u2019s working and what\u2019s not. However, the data we rely on to make their decisions is increasingly incomplete, misleading or unavailable.\n\nIn this session, we\u2019ll discuss how to use metrics to map out a newsletter strategy, from launching newsletters, determining a product/market fit and iterating on current newsletters. Participants will share the data they look at to shape their newsletter decisions, how their newsletters fit into their broader organization\u2019s strategy, and discuss problems and pitfalls with the newsletter data they have access to. We don\u2019t have all the answers! But we hope at the end of the session, participants will leave with more direction on how to use data to guide their newsletter strategy."
  },
  {
    "id": "non-writing-journalists-co-bylines",
    "title": "How do we create a world where non-writing journalists don\u2019t have to fight for co-bylines",
    "facilitators": "Greg Linch",
    "description": "It\u2019s 2026 (!!!), and many non-writing journalists still have to fight to be seen as full editorial partners. In too many newsrooms, people working in graphics, data, visuals, interactives, design, and other nontraditional roles are treated like support staff rather than journalists with editorial judgment, reporting value, and creative expertise. And credit is not about ego; it shapes power, trust, promotion, and retention. Who gets named is often a proxy for who gets valued.\n\nThis session is a chance to imagine something better together. We\u2019ll compare how different newsrooms handle credit, talk through what has and has not worked when advocating for fair recognition, and identify the habits, language, and structures that keep non-writing journalists from being treated as equals. We\u2019ll look for practical interventions at multiple levels: story planning, team communication, publication standards, and management expectations. We\u2019ll also explore whether this community wants to build something tangible out of the conversation, such as shared language, practical guidance, or even an industry-facing document that journalists can bring back to colleagues and managers who \u201cdon\u2019t get it\u201d yet."
  },
  {
    "id": "how-to-ask-for-help",
    "title": "How to ask for help",
    "facilitators": "Paul Schreiber",
    "description": "Many folks asking for help do themselves a disservice with poorly-formed questions. In this session, we'll come up with examples of poorly- and well-formed queries, and frameworks, checklists and templates for asking better questions.\n\nThis is helpful\n- as a journalist\n- as a citizen\n- dealing with legal, medical and technical professionals\n- dealing with government\n- providing bug reports and feature requests for software\n- getting things fixed"
  },
  {
    "id": "how-build-successful-co-op",
    "title": "How to build a successful consumer-owned media co-op",
    "facilitators": "Mikki Morrissette",
    "description": "With the need to involve consumers as supporters of journalism \u2014 even as people are getting used to social media as a free outlet that might seem like journalism \u2014 41-year-old Minnesota Women's Press (womenspress.com) is in the process of transitioning into a consumer-owned media co-op, which is rare in media and has not generally worked when tried. \n\nAs a 2026 cohort member of both Advancing Democracy and Start Co-op, and publisher of a grassroots-oriented media platform that centers consumers, I will lead an interactive discussion about how to maintain editorial integrity in a journalism enterprise that is co-owned by at least 1,000 people (not by private equity or billionaires) \u2014 one member, one vote.\n\nJoin us to talk about how this new venture can work, what needs to be in place to make it work, and why it is important to the future of journalism. Minnesota has co-ops for groceries, agriculture, energy, arts, and childcare \u2014 for starters; how will it smartly set the stage for the first successful consumer-owned media co-op?"
  },
  {
    "id": "how-cover-survive-federal-immigration",
    "title": "How we cover (and survive) federal immigration operations as immigrant journalists",
    "facilitators": "Cynthia Tu, Chao Xiong, Mohamed Ibrahim",
    "description": "When federal immigration actions unfold \u2014 whether it\u2019s a workplace raid, a federal-involved shooting, or protests in the streets \u2014 immigrant-led newsrooms are often covering the story while living it. In this session, journalists from Sahan Journal, a Minnesota newsroom reporting for immigrants by immigrants, will reflect on what they learned while reporting from the frontlines.\n\nWhat does it mean to cover immigration enforcement when you or your loved ones have vulnerable immigration status? How do we prepare ourselves physically and mentally before stepping into uncertain situations? And how can newsroom leaders guide and protect their team under intense pressure? The panel will offer a candid look at what it means to report on immigration enforcement not as outsiders, but as members of the communities at stake."
  },
  {
    "id": "how-investigated-ethnic-cleansing",
    "title": "How we investigated ethnic cleansing by the Sudanese Armed Forces",
    "facilitators": "Sabrina Slipchenko",
    "description": "When journalists say it's \"hard to report on Sudan,\" it can sometimes sound like an excuse not to engage. Granted, the obstacles are real: unreliable geospatial data, journalists in exile, communications blackouts, a media landscape fractured by information warfare, and access to the country controlled by the Sudanese Armed Forces \u2014 the same government we found responsible for the ethnic cleansing of non-Arab farming communities.\n\nOur investigation mapped survivor testimony and reconstructed a massacre from one of the war's key battles. To get there, we used whatever tools we could find and adapt: Telegram, TikTok, a patchwork of geospatial databases, and a lot of creative problem-solving. In this session, we'll walk through how we built that reporting infrastructure under severe constraints, and what other journalists working in similarly difficult environments might borrow or build on."
  },
  {
    "id": "how-build-better-support-networks",
    "title": "Immigration inside the newsroom: How do we build better support networks for international journalists",
    "facilitators": "Jasmine (Ye) Han, Kai Teoh",
    "description": "International journalists often face newsroom challenges that remain invisible to colleagues and managers: work authorization constraints, visa timelines, policy changes, and employers\u2019 uncertainty around sponsorship. These pressures can shape not only who gets hired, but who feels able to stay in journalism at all.\n\nIn this session, we\u2019d like to facilitate a practical conversation about what newsroom peers, managers, and community organizers can do to better support international journalists - and how to build stronger support systems around hiring, retention, and belonging. We\u2019ll share context from our work with Journalism Jobs for Internationals - a grassroots initiative - then have participants work through concrete scenarios and brainstorm solutions they could bring back to their own organizations and communities. We\u2019ll also bring some of our real unanswered questions to the room - around communication, capacity, sustainability, and community support - and invite participants to help us think through solutions that could also inform similar grassroots efforts elsewhere."
  },
  {
    "id": "making-space-joy-journalism",
    "title": "Joy Breaks: Making space for joy in journalism",
    "facilitators": "Liz Worthington, Marita P\u00e8rez Diaz",
    "description": "Journalists today are often at the front lines of crisis, whether that\u2019s covering immigration raids, war, political polarization, corruption or trauma. It may not be your job all of the time but it can be depleting, for front-line reporters, editors who work with them and for communities who experience it. Without moments of joy, curiosity and creative renewal, burnout can become inevitable. This session explores the idea of \u201cjoy breaks\u201d\u2014intentional shifts in work or practice that help journalists reconnect with creativity, perspective and the reasons they got into the field in the first place. In this session, attendees will reflect on what brings them joy and how they can carve out regular joy breaks in their routine.  Participants will walk out with a list of things to try for themselves or their newsrooms\u2026and maybe with a new mini piece of art for their desk."
  },
  {
    "id": "create-best-documentation-practices",
    "title": "Let\u2019s create a best practices guide for writing News Nerd documentation",
    "facilitators": "Alexandra Kanik",
    "description": "Every news nerd team (even one-person teams) functions differently because we all work under such different pressures and environments. Part of what makes us unique is how nimble we are, and at the same time that speed of iteration and change also means we quickly learn what should or could be better.\n\nWe\u2019re proposing coming together as a community to prototype a framework that news nerds today and in the future can use as their source - heh - and starting point for documentation about their teams, work, standards and processes."
  },
  {
    "id": "transformative-thinking-afrola-project-optimist",
    "title": "News startup as laboratory: Transformative thinking and programming at AfroLA and Project Optimist",
    "facilitators": "Nora Hertel, Dana Amihere",
    "description": "Share your experiences and hear from news startups that experiment with audience-rooted programs from an ownership campaign and printed 'zines to solutions journalism. AfroLA covers Los Angeles with unapologetically Black storytelling. Project Optimist produces solution-focused news for rural Minnesota. They'll share how they\u2019ve transformed their thinking on how to run a newsroom and what has worked (or not worked) in practice."
  },
  {
    "id": "people-dont-care-local-government",
    "title": "People don't care about \"local government.\" They care about their street.",
    "facilitators": "Maggie McGuire",
    "description": "Local news treats every story like a hit of spot news. A zoning fight isn't one article \u2014 it's a filing, three commission meetings, a public comment period, a legal  challenge, and a resolution eighteen months later. Stories have lifecycles, but we publish them as isolated events, and the civic knowledge that would help people follow along \u2014 how to search public databases, file records requests, read a zoning decision \u2014 is siloed inside journalism and government. Nobody's teaching it.\n\nAt the Moab Sun News, we've been experimenting with lifecycle projects that use the whole animal: wiki-style reference sites where coverage accumulates by subject, searchable meeting archives, subject-based alerts, public-facing trainings with experts who've never taught the public before, and tools that turn readers into contributors. In this session, we'll explore a toolkit of these models, then you'll design your own: pick an issue your community cares about, figure out what tools fit, how each piece feeds the others, and what makes it sustainable for a small team. You'll leave with a concrete sketch you can start building next month."
  },
  {
    "id": "developing-designing-distributing-journalism-zines",
    "title": "Print goes underground: Developing, designing, and distributing journalism zines",
    "facilitators": "Sarah Bennett",
    "description": "When digital platforms fail communities \u2014 through paywalls, algorithmic suppression, language barriers or distrust \u2014 how can local journalists distribute reliable information? Zine makers have had an answer for decades: print it, fold it, put it in people's hands. \n\nThis session is a practitioner (and practitioner-curious) conversation about small-batch, alternative print as an emerging and legitimate tool for informing and engaging communities. We'll talk through our experiences and ideas for the three phases of zine production \u2014 develop, design, and distribute \u2014 using examples from recent journalism zines, student work, and entries from the SPJ's first-ever Zine Prize as jumping-off points. We'll start a shared best practices document together, and I'll try to turn our notes into a physical zine, printed overnight and in your hands on day two."
  },
  {
    "id": "putting-open-back-source",
    "title": "Putting the Open back in Source: How can we make it as easy as 1-2-3, open source-ame?",
    "facilitators": "Emilia Ruzicka, Tiff Fehr",
    "description": "The number of open source projects produced by journalists is shrinking. News organizations are innovating behind closed doors, producing awesome work, but without clear insight into the technical process that led to the final product. This setup makes it more difficult to learn from others and is a missed opportunity to document data and processes that could be useful in the future. However, keeping information off the web prevents it from being processed by AI tools itching to take even more data from journalism.\n\nHow can we revive open source journalism as reporters, editors, newsroom leaders, and more? What might incentivize news organizations to get on board with more widespread open source efforts? What can we do to share amongst ourselves to uplift and iterate journalistic work without feeding that information directly back to private AI tech companies? These questions and more will be on the table for discussion!"
  },
  {
    "id": "reporting-solutions-world-fire",
    "title": "Reporting solutions when the world Is on fire",
    "facilitators": "Jaisal Noor",
    "description": "By most accounts, the media\u2019s current approach is neither creating a well-informed public nor truly holding the powerful to account. The industry\u2019s relentless focus on crisis and spectacle has driven away news consumers, fueled deep distrust in institutions and the media itself, and left many journalists burned out or leaving the profession altogether. Audiences are left overwhelmed, disengaged and without the information they need to address the biggest problems facing their communities. \n\nThis workshop will create space for journalists to reflect on how to report on solutions at a time when many feel overwhelmed by the state of the world.  We\u2019ll explore how to cover responses without minimizing harm or injustice, and how to build trust with communities by working in partnership with them.  The goal is for participants to leave with actionable ideas, practical approaches and a renewed sense of possibility for reporting constructively toward a better future."
  },
  {
    "id": "how-ai-handles-information-environments",
    "title": "Response, retrieval & resistance: Auditing how AI models handle politically contested information environments",
    "facilitators": "Madison Karas, Aaron Zou, David Kuszmar",
    "description": "When someone asks an AI model about a breaking news event, how much does the way they ask shape what they get back? Our team at Gazzetta has been running structured audits testing how leading LLMs respond to politically cued and framed prompts in authoritarian information ecosystems, specifically in Iran and China. What we've found is striking: models differ meaningfully in how they mirror or resist state-aligned framing, with real implications for how users distinguish between journalism and propaganda.\n\nIn this session, we'll briefly share our research findings and methodology, then put the tools directly in participants' hands. Using cases from our conference home of Minneapolis, including recent ICE enforcement actions, shootings, and historical police killings, we'll work together in real time to design prompts, run tests across multiple models, and compare what comes back. You'll leave with a reproducible methodology and the confidence to apply it in your own work, whether you're a journalist covering AI, a researcher using LLMs to investigate, or navigating something in between."
  },
  {
    "id": "why-journalists-stay-profession-crisis",
    "title": "Still here: Why journalists stay in a profession in crisis",
    "facilitators": "Luisa Ortiz P\u00e9rez, Joe Ruiz",
    "description": "Journalism is widely described as a profession in crisis\u2014marked by layoffs, burnout, hostility, shrinking autonomy, and rapid technological disruption. Yet journalists are not leaving at the rate many expect. Drawing on findings from *Stay Tuned: A U.S. Journalism Mental Health Survey* (MDRnet, 2026), this session asks a simple but urgent question: **why do we stay?** We\u2019ll explore three forces shaping journalists\u2019 decisions to remain in the field: the fear and identity shifts tied to leaving journalism, the normalization of uncertainty in an industry defined by constant change, and the enduring belief that journalism still matters. Together, these tensions reveal something deeper about the profession \u2014 how resilience, care, and crisis management have become essential not just for individual survival, but for the future of the field itself."
  },
  {
    "id": "teach-newsletters-wire-stories",
    "title": "Teach newsletters, not wire stories",
    "facilitators": "Blake Eskin",
    "description": "Teaching AP Style and the inverted pyramid made sense in an era where entry-level reporting and editing jobs at newspapers of any size required this knowledge. Those jobs are mostly gone, and the newsroom's division of labor \u2014 writer vs. photographer, editorial vs. business \u2014 has dissolved. Yet most journalism education puts a priority on the isolated craft of writing voiceless news reports (or voicey feature stories). \n\nPutting together a newsletter gives aspiring journalists the chance to practice a much wider range of skills than writing an article: not only reporting and writing but audience research and engagement, information design, visual communication, aggregation, linking to and attributing prior knowledge, proofreading, publishing on a schedule\u2026\n\nWhat's the first project you'd give an aspiring journalist? What other forms work better than the article for teaching the skills aspiring journalists need today to meet the information needs of their audiences?"
  },
  {
    "id": "future-news-accessible",
    "title": "The future of news is accessible",
    "facilitators": "Stacy Kess",
    "description": "As journalism becomes more digital and more directed to social media, news is leaving out millions of people. Disability is more common that most realize: 1 in 4 American adults identify as disabled; 1 in 5 American adults are on the spectrum of blindness or low vision; 1 in 20 American adults are Deaf or hard of hearing; and 1 in 100 American adults have a cognitive disability, but the digital journalism industry isn't reaching these potential news consumers \u2014\u00a0meaning potential lost readers, listeners, and watchers; potential lost revenue; and eventually, potential lost jobs. But it's more than these missing new audience member's dollars. Bringing in more readers, listeners, and watchers strengthens democracy, community, and civic participation. The future of news must be accessible."
  },
  {
    "id": "understanding-tracked-audience-behavior",
    "title": "Understanding what gets tracked about your audience and their behavior in your product",
    "facilitators": "Julia Haslanger",
    "description": "Where does all that data about how many people read/watched your story come from? This session will be a little bit of web analytics 101 (including going into the browser console and spying on how your favorite news site is logging everything you do), but we'll also have conversations about the limitations of tracking (both technical and philosophical), the ethics involved, the legal landscape, and more. If there's interest, we'll dive into how tracking is different within a mobile app, how the social platforms share the data they track, and more. And, if people in the rooms have opinions they want to share, we could also do a vent/praise session about various analytics vendors."
  },
  {
    "id": "learned-building-newsroom-tech-stack",
    "title": "What I learned building a newsroom tech stack without knowing how to code",
    "facilitators": "Nina Ignaczak",
    "description": "What does it actually look like to build production journalism tools without an engineering background, or an engineering budget? Nina Ignaczak, founder and executive director of Planet Detroit, will share real examples from her newsroom's experience shipping a civic engagement tool, a RAG-powered search API, an interactive directory of 600+ Michigan environmental organizations, and more, all through conversational AI development. But what surprised her most wasn't how much AI could do. It was how much results improved once she started thinking like a software engineer. Adopting a spec-driven process, defining who a tool is for, what working correctly looks like, and what broken looks like before touching any code, made everything better. \n\nUnderstanding basic architecture concepts meant more useful conversations with AI tools, fewer late-stage surprises, and tools that actually held up in production. The second half of the session turns it over to participants. In small groups, attendees will take a real problem from their own newsroom and work through the first steps of building a solution, drafting a spec, scoping the problem, thinking through edge cases. Everyone leaves with something concrete they can actually use, and a better sense of what's within reach when you pair curiosity with a little engineering discipline."
  },  {
    "id": "understanding-cultural-memory-community-storytelling",
    "title": "Where stories actually live: Understanding cultural memory and community storytelling",
    "facilitators": "Anneshia Hardy",
    "description": "Journalists are often trained to focus on events, sources, and facts. But the communities they cover interpret those events through something deeper: cultural memory, storytelling traditions, and inherited narratives about place, identity, and power. This session explores how cultural memory shapes the way communities understand news, respond to journalism, and decide which stories matter. Drawing from community narrative research across the Deep South, this session introduces the Applied Cultural Meaning & Memory Framework\u2122, created by cultural narrative strategist and researcher Anneshia Hardy, a PhD student in Communication at Georgia State University, through years of working alongside storytellers, organizers, journalists, and culture keepers across the region. The framework explores how cultural memory and community storytelling traditions shape how people understand news, power, and the stories told about their lives.\n\nParticipants will explore how journalists can better understand the narrative environments that shape public interpretation of news, particularly in communities with strong oral storytelling traditions and deep historical memory. The session will also highlight emerging models of community-rooted journalism, including initiatives connected to the Southern Narrative Project and the People\u2019s Press Institute, which support local storytellers and help strengthen narrative ecosystems outside traditional newsrooms. Participants will leave with practical strategies for recognizing community storytelling systems and for building deeper relationships with the places and people their reporting serves."
  },
  {
    "id": "artistic-journalism-not-use-ai",
    "title": "You don\u2019t need to be an artist to do artistic journalism (and how not to use AI)",
    "facilitators": "Jakub G\u00f3rnicki",
    "description": "Journalism is drowning in a sea of perfectly structured, frictionless, AI-generated content. But this isn't the first time a new technology has forced a medium to evolve. When photography arrived, painting was freed from strict realism and became art. When radio broke news faster, print had to dig deeper. When dry facts weren't enough, Truman Capote and the New Journalism movement brought literary artistry to reportage. AI is simply our newest catalyst. It is forcing journalism to find its new purpose: deep, visceral, un-automatable emotion.\n\nIn this 75-minute interactive workshop, we will explore how to apply artistic methods to our daily reporting to create an antidote to shallow media. We\u2019ll look at real examples of how to borrow frameworks from theater, street art, and sound design. Then, we\u2019ll break into groups for a rapid-fire design sprint using your own upcoming stories. You don't need a fine arts degree to do this. You\u2019ll leave with concrete tools and a blueprint to transform a standard pitch into a bold, artistic experience that no algorithm can replicate."
  }
]