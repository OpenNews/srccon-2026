    "title": "The biggest lessons I learned while reporting on art and art crime",
    "facilitators": "Karen Ho",
    "description": "For nearly three years, I covered art and art crime for ARTnews. I didn\u2019t have a background in either beat, but successfully used my previous experience reporting on finance and economics to produce distinctive features, data and investigative coverage. This included reports on artworks and historical artifacts stolen from galleries, homes, and museums; museums repatriating stolen and looted items; art dealers accused of breaking US sanctions; NFT scams; the British Museum theft scandal; federal legislation about Nazi-looted artworks and unreturned Native ancestral remains; as well as a range of lawsuits about art loans, accusations of wrongful dismissals, copyright infringement, intellectual property, class-action cases against AI image generators, and high-profile art insurance claims.\n\nIt turns out that art and art crime aren\u2019t as niche as many people think. This presentation will explain how I was able to find \"local\" art angles for national and international news stories, the tools I used and developed to cover these beats, and the simple secrets behind some of my biggest scoops.",
